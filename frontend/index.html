<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clínica Estética – Sistema de Gestão</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-text">Clínica Estética</span>
      </div>
      <nav id="menu" class="menu"></nav>
      <div class="sidebar-footer">
        <span id="db-status" class="db-status">● verificando…</span>
        <span class="versao">v1.0 — Banco de Dados II</span>
      </div>
    </aside>

    <!-- Conteúdo -->
    <main class="content" id="content"></main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header"><h3 id="modal-titulo"></h3></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secundario" id="modal-cancelar">Cancelar</button>
        <button class="btn btn-primario" id="modal-salvar">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-area" id="toast-area"></div>

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
